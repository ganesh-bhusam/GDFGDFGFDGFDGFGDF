<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Contact - AdvScribbl</title>
  <meta name="description" content="Contact the AdvScribbl team for support, feedback, or business inquiries.">
  <link rel="icon" href="/img/legacy-panel.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Outfit:wght@400;600;800;900&family=Patrick+Hand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .info-page-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .info-page-container h1 {
      font-size: 2.5rem;
      text-align: center;
      color: var(--accent-gold);
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    .info-page-content {
      padding: 40px;
      font-size: 1.1rem;
      line-height: 1.6;
      text-align: center;
    }
    .info-page-content p {
      margin-bottom: 24px;
    }
    .contact-email {
      font-size: 1.5rem;
      font-weight: 800;
      color: #3b220c;
      padding: 20px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 12px;
      display: inline-block;
    }
    .back-btn {
      align-self: flex-start;
      margin-bottom: 20px;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <!-- Static illustrated background -->
  <div id="bg-illustration" aria-hidden="true"></div>
  
  <div class="info-page-container">
    <a href="/" class="btn btn-play-blue back-btn">← Back to Home</a>
    <h1>Contact Us</h1>
    
    <div class="glass-panel info-page-content">
      <div class="screw tl"></div>
      <div class="screw tr"></div>
      <div class="screw bl"></div>
      <div class="screw br"></div>
      
      <h2>Get in Touch</h2>
      <p>We'd love to hear from you! Whether you have feedback on the game, encountered a bug, or just want to say hi, feel free to reach out to us.</p>
      
      <div class="contact-email" style="color: #4a2c11 !important;">
        hello@advscribbl.com
      </div>
      
      <p style="margin-top: 24px;">Please allow up to 48 hours for a response from our support team.</p>
    </div>
  </div>
</body>
</html>
